version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: radar_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-radar_trabalhista}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: radar_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: radar_api
    env_file: ../.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: radar_web
    env_file: ../.env
    ports:
      - "3000:3000"
    depends_on:
      - api

  prefect:
    image: prefecthq/prefect:2-latest
    container_name: radar_prefect
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-radar_trabalhista}
    ports:
      - "4200:4200"
    depends_on:
      postgres:
        condition: service_healthy
    command: prefect server start --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:
