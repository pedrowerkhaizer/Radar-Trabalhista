version: "3.9"

# PostgreSQL de aplicação: Supabase (externo — sem serviço local)
# Credenciais em ../.env (POSTGRES_HOST, POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD)

services:
  redis:
    image: redis:7-alpine
    container_name: radar_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: radar_api
    env_file: ../.env
    environment:
      # Docker networking: redis é acessível pelo nome do serviço, não localhost
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: radar_web
    env_file: ../.env
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  prefect_postgres:
    image: postgres:16-alpine
    container_name: radar_prefect_postgres
    environment:
      POSTGRES_DB: prefect
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - prefect_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  prefect:
    image: prefecthq/prefect:2-latest
    container_name: radar_prefect
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@prefect_postgres:5432/prefect
    ports:
      - "4200:4200"
    depends_on:
      prefect_postgres:
        condition: service_healthy
    command: prefect server start --host 0.0.0.0

volumes:
  redis_data:
  prefect_postgres_data:
